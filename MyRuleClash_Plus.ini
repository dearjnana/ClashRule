;===== 2. 地区智能阶梯兜底策略组（核心魔法所在：实现良心云➔ikuuu➔MESL严格降级） =====
custom_proxy_group=🇭🇰 香港节点`fallback`[]☁️🇭🇰 良心云-香港`[]🌟🇭🇰 ikuuu-香港`[]⚡🇭🇰 MESL-香港
custom_proxy_group=🇹🇼 台湾节点`fallback`[]☁️🇹🇼 良心云-台湾`[]🌟🇹🇼 ikuuu-台湾`[]⚡🇹🇼 MESL-台湾
custom_proxy_group=🇯🇵 日本节点`fallback`[]☁️🇯🇵 良心云-日本`[]🌟🇯🇵 ikuuu-日本`[]⚡🇯🇵 MESL-日本
custom_proxy_group=🇸🇬 新加坡节点`fallback`[]☁️🇸🇬 良心云-新加坡`[]🌟🇸🇬 ikuuu-新加坡`[]⚡🇸🇬 MESL-新加坡
custom_proxy_group=🇰🇷 韩国节点`fallback`[]☁️🇰🇷 良心云-韩国`[]🌟🇰🇷 ikuuu-韩国`[]⚡🇰🇷 MESL-韩国
custom_proxy_group=🇺🇸 美国节点`fallback`[]☁️🇺🇸 良心云-美国`[]🌟🇺🇸 ikuuu-美国`[]⚡🇺🇸 MESL-美国

; 全地区联动大总管（只有当 6 个地区的良心云、ikuuu 都挂了，才会摸到 MESL 节点）
custom_proxy_group=♻️ 阶梯自动选择`fallback`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点


