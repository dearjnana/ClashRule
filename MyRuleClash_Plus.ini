;=================================================================
; 核心策略逻辑：
; 1. 核心 Top 6 地区：港、台、日、新、韩、美
; 2. 流量性价比分层（Fallback）：主力良心云 ➔ 替补ikuuu ➔ 兜底高资费MESL
;=================================================================

;===== 1. 基础地区测速组（按机场分流，剔除冷门地区，精简正则） =====
;--- 香港 ---
custom_proxy_group=☁️🇭🇰 良心云-香港`url-test`(.*\[良心云\].*(港|HK|HongKong))`http://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🌟🇭🇰 ikuuu-香港`url-test`(.*\[ikuuu\].*(港|HK|HongKong))`http://www.gstatic.com/generate_204`600,,50
custom_proxy_group=⚡🇭🇰 MESL-香港`url-test`(.*\[MESL\].*(港|HK|HongKong))`http://www.gstatic.com/generate_204`600,,50

;--- 台湾 ---
